name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Rust crate artifact ──
  rust:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Rust library
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          dir="pyspice-rs-${tag}-${{ matrix.target }}"
          mkdir "$dir"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/pyspice.dll "$dir/" 2>/dev/null || true
            cp target/${{ matrix.target }}/release/pyspice.lib "$dir/" 2>/dev/null || true
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cp target/${{ matrix.target }}/release/libpyspice.dylib "$dir/" 2>/dev/null || true
            cp target/${{ matrix.target }}/release/libpyspice.a "$dir/" 2>/dev/null || true
          else
            cp target/${{ matrix.target }}/release/libpyspice.so "$dir/" 2>/dev/null || true
            cp target/${{ matrix.target }}/release/libpyspice.a "$dir/" 2>/dev/null || true
          fi
          tar czf "${dir}.tar.gz" "$dir"

      - uses: actions/upload-artifact@v4
        with:
          name: rust-${{ matrix.target }}
          path: "*.tar.gz"

  # ── C ABI artifact ──
  cabi:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build C ABI library
        run: cargo build --release --features cabi --no-default-features --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          dir="pyspice-rs-cabi-${tag}-${{ matrix.target }}"
          mkdir "$dir"
          cp src/cabi.rs "$dir/pyspice.h.reference" 2>/dev/null || true
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/pyspice.dll "$dir/" 2>/dev/null || true
            cp target/${{ matrix.target }}/release/pyspice.lib "$dir/" 2>/dev/null || true
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cp target/${{ matrix.target }}/release/libpyspice.dylib "$dir/" 2>/dev/null || true
          else
            cp target/${{ matrix.target }}/release/libpyspice.so "$dir/" 2>/dev/null || true
          fi
          tar czf "${dir}.tar.gz" "$dir"

      - uses: actions/upload-artifact@v4
        with:
          name: cabi-${{ matrix.target }}
          path: "*.tar.gz"

  # ── Python wheels (maturin) ──
  python:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  # ── Python sdist ──
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── GitHub Release ──
  release:
    needs: [rust, cabi, python, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.whl' \) -exec cp {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
